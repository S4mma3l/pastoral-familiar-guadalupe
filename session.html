<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Sesión — Pastoral Familiar</title>
  <link rel="stylesheet" href="css/styles.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✝️</text></svg>" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.0/dist/umd/supabase.min.js" integrity="sha384-p3ppjAbdEPObbT9B8J3Jc/6aBp2Gl54cFACgyZjDVLaR3+KwIc+eeU9V6vqHa/Ml" crossorigin="anonymous"></script>
  <script src="js/config.js"></script>
</head>
<body>

  <nav class="topnav">
    <div class="nav-brand">
      <button class="btn-icon-circle" onclick="window.location.href='dashboard.html'" title="Volver">
        <svg class="icon-sm" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      </button>
      <span class="nav-title" id="nav-session-title">Sesión</span>
    </div>
    <div class="nav-actions">
      <div id="nav-user"></div>
    </div>
  </nav>

  <nav class="bottom-nav">
    <button class="bnav-btn" onclick="window.location.href='feed.html'">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
      Inicio
    </button>
    <button class="bnav-btn active" onclick="window.location.href='dashboard.html'">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
      Sesiones
    </button>
    <button class="bnav-new" onclick="window.location.href='feed.html'">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button class="bnav-btn" onclick="window.location.href='profile.html'">
      <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      Perfil
    </button>
  </nav>

  <div id="session-main" class="page page-session">
    <div class="loading-state"><div class="spinner"></div><p>Cargando sesión…</p></div>
  </div>

  <!-- Barra fija de comentarios (encima del bottom nav) -->
  <div id="session-comment-bar" class="session-comment-bar hidden">
    <div class="scb-inner">
      <div class="avatar sm" id="scb-avatar" style="background:var(--p)">A</div>
      <textarea id="comment-input" class="scb-textarea" placeholder="Comenta en la sesión…" maxlength="500" rows="1"></textarea>
      <button class="scb-send" onclick="submitComment(event)" title="Publicar">
        <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="#fff" stroke-width="2.2" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
      </button>
    </div>
    <div class="scb-char" id="char-count">0 / 500</div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/app.js"></script>
  <script src="js/session.js"></script>
  <script>
    let currentSession = null;
    let currentProfile = null;

    (async () => {
      const session = await requireAuth();
      if (!session) return;
      currentProfile = await getProfile(session.user.id);

      const av = currentProfile.avatar_url
        ? `<img src="${currentProfile.avatar_url}" />`
        : currentProfile.nickname.charAt(0).toUpperCase();
      document.getElementById('nav-user').innerHTML =
        `<div class="avatar sm" style="background:${currentProfile.color};cursor:pointer" onclick="window.location.href='profile.html'">${av}</div>`;

      const params = new URLSearchParams(window.location.search);
      const sessionId = params.get('id');
      if (!sessionId) { window.location.href = 'dashboard.html'; return; }
      await loadSession(sessionId);
    })();

    async function loadSession(id) {
      const { data, error } = await supabase.from('sessions').select('*').eq('id', id).single();
      if (error || !data) { window.location.href = 'dashboard.html'; return; }
      currentSession = data;
      document.getElementById('nav-session-title').textContent = data.title;
      document.title = `${data.title} — Pastoral Familiar`;
      renderSession(data);
    }

    function renderSession(s) {
      const avHtml = currentProfile.avatar_url
        ? `<img src="${currentProfile.avatar_url}" />`
        : currentProfile.nickname.charAt(0).toUpperCase();

      const main = document.getElementById('session-main');
      main.innerHTML = `
        <!-- HERO -->
        <div class="session-hero">
          <div class="session-hero-emoji">${s.cover_emoji || '✝️'}</div>
          <h1 class="session-hero-title">${escapeHtml(s.title)}</h1>
          ${s.description ? `<p class="session-hero-desc">${escapeHtml(s.description)}</p>` : ''}
        </div>

        <!-- VIDEO -->
        ${s.video_url ? `
        <div class="content-card">
          <div class="content-card-label">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--p)" stroke-width="1.8" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
            Video de la sesión
          </div>
          <div class="video-wrap">
            <iframe src="${getEmbedUrl(s.video_url)}" frameborder="0"
              allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
              allowfullscreen loading="lazy"></iframe>
          </div>
        </div>` : ''}

        <!-- LECTURA -->
        ${s.document_content ? `
        <div class="content-card">
          <div class="content-card-label">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--p)" stroke-width="1.8" stroke-linecap="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
            Lectura
          </div>
          <div class="doc-body">${sanitizeContent(s.document_content)}</div>
        </div>` : ''}

        <!-- ACTIVIDADES -->
        <div class="content-card" id="activities-section">
          <div class="content-card-label">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--p)" stroke-width="1.8" stroke-linecap="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"/></svg>
            Actividades
          </div>
          <div id="activities-list"><div class="mini-spin"></div></div>
        </div>

        <!-- COMENTARIOS -->
        <div class="content-card">
          <div class="content-card-label">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="var(--p)" stroke-width="1.8" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            Comentarios de la comunidad
          </div>
          <div id="comments-list"><div class="mini-spin"></div></div>
        </div>
      `;

      // Mostrar la barra fija de comentario y configurar el avatar
      const bar = document.getElementById('session-comment-bar');
      bar.classList.remove('hidden');
      const scbAv = document.getElementById('scb-avatar');
      if (currentProfile.avatar_url) { scbAv.innerHTML = '<img src="' + escapeHtml(currentProfile.avatar_url) + '" />'; }
      else { scbAv.textContent = currentProfile.nickname.charAt(0).toUpperCase(); }
      scbAv.style.background = currentProfile.color;

      // Auto-resize textarea + contador de caracteres
      const ta = document.getElementById('comment-input');
      ta.addEventListener('input', function() {
        this.style.height = 'auto';
        this.style.height = Math.min(this.scrollHeight, 120) + 'px';
        document.getElementById('char-count').textContent = this.value.length + ' / 500';
      });

      loadActivities(s.id);
      loadComments(s.id);
      subscribeToComments(s.id);
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2700);
    }
  </script>
</body>
</html>
